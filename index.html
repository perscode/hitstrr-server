// ── Helpers ───────────────────────────────────────────────────────────────────
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function h(tag,attrs){const el=document.createElement(tag);if(attrs)for(const[k,v]of Object.entries(attrs)){if(k==='class')el.className=v;else if(k==='click')el.onclick=v;else if(k==='text')el.textContent=v;else if(k==='style')Object.assign(el.style,v);else if(k==='disabled'){if(v)el.disabled=true;}else if(k==='placeholder')el.placeholder=v;else if(k==='value')el.value=v;else if(k==='input')el.oninput=v;else el.setAttribute(k,v);}return el;}
function ap(parent,...kids){kids.flat().forEach(k=>{if(k==null)return;if(typeof k==='string')parent.appendChild(document.createTextNode(k));else parent.appendChild(k);});return parent;}
function div(cls,...kids){return ap(h('div',{class:cls}),...kids);}
function btn(cls,txt,onclick,disabled){const b=h('button',{class:cls,text:txt,click:onclick});if(disabled)b.disabled=true;return b;}

// ── All available playlists (server + bundled merged, deduped by spotifyId) ───
function getAllPlaylists(){
  const seen = new Set();
  const out = [];
  // Server playlists first (they're more up to date)
  for(const pl of state.serverPlaylists){
    if(!seen.has(pl.spotifyId)){seen.add(pl.spotifyId);out.push({...pl,id:pl.spotifyId});}
  }
  // Then bundled fallbacks (skip if already from server)
  for(const pl of BUNDLED_PLAYLISTS){
    if(!seen.has(pl.id)){seen.add(pl.id);out.push(pl);}
  }
  return out;
}

// ── Server API calls ──────────────────────────────────────────────────────────
async function loadServerPlaylists(){
  if(API_URL.includes('YOUR_RAILWAY_URL')){
    state.playlistsLoaded=true;state.playlistsError=null;render();return;
  }
  try{
    const res=await fetch(API_URL+'/playlists');
    if(!res.ok)throw new Error('Server error '+res.status);
    state.serverPlaylists=await res.json();
    state.playlistsLoaded=true;state.playlistsError=null;
  }catch(e){
    state.playlistsLoaded=true;state.playlistsError=e.message;
  }
  render();
}

async function submitPlaylist(){
  if(!state.addUrl.trim())return;
  state.addStatus='loading';render();
  try{
    const res=await fetch(API_URL+'/playlists',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:state.addUrl.trim(),emoji:state.addEmoji}),
    });
    // Parse response safely
    const text=await res.text();
    let data;
    try{ data=JSON.parse(text); }
    catch(e){ throw new Error('Server error — please try again in a moment'); }
    if(!res.ok)throw new Error(data.error||'Failed to add playlist');
    // Success
    await loadServerPlaylists();
    state.addStatus='success';state.addUrl='';state.addEmoji='🎵';
    setTimeout(()=>{state.addStatus=null;state.addingPlaylist=false;render();},2500);
  }catch(e){
    state.addStatus={error:e.message};
  }
  render();
}

async function submitCSV(){
  if(!state.addCsvText.trim()||!state.addCsvName.trim())return;
  state.addStatus='loading';render();
  try{
    const res=await fetch(API_URL+'/playlists/import-csv',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({csv:state.addCsvText.trim(),name:state.addCsvName.trim(),emoji:state.addEmoji}),
    });
    const text=await res.text();
    let data;
    try{data=JSON.parse(text);}catch(e){throw new Error('Server error — please try again');}
    if(!res.ok)throw new Error(data.error||'Failed to import playlist');
    await loadServerPlaylists();
    state.addStatus='success';state.addCsvText='';state.addCsvName='';state.addEmoji='🎵';
    setTimeout(()=>{state.addStatus=null;state.addingPlaylist=false;render();},2500);
  }catch(e){
    state.addStatus={error:e.message};
  }
  render();
}

async function deletePlaylist(spotifyId){
  if(!confirm('Remove this playlist from the game?'))return;
  try{
    await fetch(API_URL+'/playlists/'+spotifyId,{method:'DELETE'});
    await loadServerPlaylists();
    // Deselect if selected
    state.selectedPlaylists=state.selectedPlaylists.filter(x=>x!==spotifyId);
    render();
  }catch(e){alert('Failed to remove: '+e.message);}
}

// ── QR renderer ───────────────────────────────────────────────────────────────
function makeQR(id){
  const data=QR_DATA[id];
  if(!data)return h('div',{class:'qr-miss',text:'No QR — new playlist track'});
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('viewBox',data.vb);svg.setAttribute('width','260');svg.setAttribute('height','260');
  svg.setAttribute('shape-rendering','crispEdges');svg.style.cssText='border-radius:12px;display:block;background:#fff';
  const vb=data.vb.split(' ');
  const bg=document.createElementNS(ns,'path');bg.setAttribute('fill','#fff');bg.setAttribute('d','M0 0h'+vb[2]+'v'+vb[3]+'H0z');
  const p=document.createElementNS(ns,'path');p.setAttribute('stroke','#000');p.setAttribute('d',data.d);
  svg.appendChild(bg);svg.appendChild(p);return svg;
}

// For tracks without pre-generated QR, generate a live Spotify URL QR using a data URI approach
// We'll render a simple "scan this URL" fallback
function makeQRFallback(spotifyId){
  const url='https://open.spotify.com/track/'+spotifyId;
  // Show URL as text with a link — user can tap it on Phone 2
  const wrap=div('qr-fallback');
  ap(wrap,
    h('p',{class:'qr-fallback-label',text:'New track — open on Phone 2:'}),
    h('a',{class:'qr-fallback-link',text:url,href:url,target:'_blank'})
  );
  return wrap;
}

function renderQR(spotifyId){
  const data=QR_DATA[spotifyId];
  return data ? makeQR(spotifyId) : makeQRFallback(spotifyId);
}

function render(){
  const app=document.getElementById('app');
  while(app.firstChild)app.removeChild(app.firstChild);
  if(state.screen==='home')app.appendChild(renderHome());
  else if(state.screen==='game')app.appendChild(renderGame());
  else app.appendChild(renderResults());
}

}

function buildCombinedPlaylist(){
  const seen=new Set();const out=[];
  const all=getAllPlaylists();
  state.selectedPlaylists.forEach(id=>{
    const pl=all.find(p=>(p.id||p.spotifyId)===id);
    if(!pl)return;
    pl.tracks.forEach(t=>{
      const tid=t.id||t.spotifyId;
      if(!seen.has(tid)){seen.add(tid);out.push({...t,id:tid});}
    });
  });
  return out;
}

// ── Priority / correctness ────────────────────────────────────────────────────
function challengePriority(n){
  const turn=state.turn,others=[];
  for(let i=1;i<n;i++) others.push((turn+i)%n);
  others.sort((a,b)=>{const diff=state.timelines[a].length-state.timelines[b].length;return diff!==0?diff:others.indexOf(a)-others.indexOf(b);});
  return others;
}
function isCorrect(tl,card,slot){const next=[...tl];next.splice(slot,0,card);return next.every((t,i)=>i===0||next[i-1].year<=t.year);}

function doReveal(){
  const{card,turn,challenges,slot}=state;
  const tl=state.timelines[turn];
  const n=state.playerNames.slice(0,state.playerCount).length;
  const others=[];for(let i=1;i<n;i++) others.push((turn+i)%n);
  const sorted=[...challenges].filter(c=>c.slot!==-1).sort((a,b)=>{
    const diff=state.timelines[a.playerIdx].length-state.timelines[b.playerIdx].length;
    return diff!==0?diff:others.indexOf(a.playerIdx)-others.indexOf(b.playerIdx);
  });
  let winner=null;
  for(const c of sorted){
    if(isCorrect(tl,card,c.slot)){
      winner=c.playerIdx;
      const wt=[...state.timelines[winner],card];wt.sort((a,b)=>a.year-b.year);
      state.timelines[winner]=wt;state.scores[winner]++;break;
    }
  }
  if(winner===null&&isCorrect(tl,card,slot)){
    winner=turn;
    const next=[...tl];next.splice(slot,0,card);
    state.timelines[turn]=next;state.scores[turn]++;
  }
  state.result={winner,gameWon:winner!==null&&state.scores[winner]>=state.goalScore};
  state.phase='namebonus';render();
}

// ── Game screen ───────────────────────────────────────────────────────────────
function renderGame(){
  const{card,turn,phase,slot,result,scores,timelines,playlist,playerNames,playerCount,viewingTimeline}=state;
  const players=playerNames.slice(0,playerCount);
  const tl=timelines[turn];
  const root=div('');
  if(viewingTimeline!==null)ap(root,renderModal());
  ap(root,ap(div('header-row'),h('span',{class:'header-pl',text:playlist.emoji+' '+playlist.name}),ap(div('header-right'),h('span',{class:'header-goal',text:'🏆'+state.goalScore}),h('span',{class:'header-left',text:state.deck.length+' left'}))));
  const sb=div('scoreboard');
  players.forEach((name,i)=>{
    const chip=div('chip'+(i===turn?' active':''));
    const nameEl=h('span',{class:'chip-name chip-name-tap',text:name});
    nameEl.onclick=()=>{state.viewingTimeline=i;render();};
    ap(chip,nameEl,h('span',{class:'chip-score',text:''+scores[i]}));
    const dots=div('chip-tokens');
    for(let t=0;t<Math.max(START_TOKENS,state.tokens[i]);t++) ap(dots,h('span',{class:'token-dot '+(t<state.tokens[i]?'token-on':'token-off'),text:'⚡'}));
    ap(chip,dots);ap(sb,chip);
  });
  ap(root,sb);
  ap(root,h('p',{class:'turn-hint',text:'Tap a name to see their timeline'}));
  const turnLine=h('p',{class:'turn-line'});ap(turnLine,ap(h('b',{class:'turn-name'}),players[turn]),"'s turn");ap(root,turnLine);

  if(phase==='draw'){
    const dc=div('deck-card');
    dc.onclick=()=>{
      if(!state.deck.length){state.screen='results';render();return;}
      const[next,...rest]=state.deck;
      state.card=next;state.deck=rest;state.phase='place';state.slot=null;state.locked=false;state.result=null;state.challenges=[];render();
    };
    ap(dc,h('span',{class:'deck-emoji',text:'🎵'}),h('p',{class:'deck-label',text:'TAP TO DRAW'}),h('p',{class:'deck-sub',text:state.deck.length+' cards left'}));
    ap(root,ap(div('deck-wrap'),dc));
  }

  if(phase==='place'&&card){
    ap(root,ap(div('qr-card'),h('p',{text:'📲 Phone 2: scan to play in Spotify'}),renderQR(card.id||card.spotifyId),h('p',{class:'qr-sub',text:"Others: don't look at Phone 2!"})));
    ap(root,h('div',{class:'mystery-card',text:'🎵 Mystery Song — tap a slot to place it'}));
    ap(root,renderPlaceSlots(tl,slot));
    if(slot!==null){
      ap(root,btn('lock-btn','🔒 Lock in & start challenge phase',()=>{state.locked=true;state.phase='challenge';render();}));
    }
  }

  if(phase==='challenge'&&card){
    ap(root,ap(div('qr-card'),h('p',{text:'📲 Phone 2: scan to listen again'}),renderQR(card.id||card.spotifyId)));
    ap(root,div('card',h('p',{class:'label',text:players[turn]+"'s placement"}),renderSlotsStatic(tl,slot,[])));
    const challengeCard=div('card');
    ap(challengeCard,h('p',{class:'label',text:'⚡ CHALLENGE PHASE'}));
    ap(challengeCard,h('p',{class:'challenge-info',text:'Spend a token to challenge a different slot. One player per slot. Fewest cards = first pick.'}));
    const order=challengePriority(playerCount);
    const takenSlots=new Set([slot]);
    state.challenges.forEach(c=>{if(c.slot!==-1)takenSlots.add(c.slot);});
    order.forEach(idx=>{
      const existing=state.challenges.find(c=>c.playerIdx===idx);
      const noTokens=state.tokens[idx]<=0;
      const playerRow=div('challenge-player-row');
      ap(playerRow,h('span',{class:'challenge-player-name',text:players[idx]}),h('span',{class:'challenge-tokens-left',text:'⚡'.repeat(state.tokens[idx])||'(none)'}));
      if(existing){
        if(existing.slot===-1)ap(playerRow,h('span',{class:'challenge-passed',text:'— Passed'}));
        else{const b2=tl[existing.slot-1],a2=tl[existing.slot];const lbl=existing.slot===0?'Before '+(a2?.year??'?'):existing.slot===tl.length?'After '+(b2?.year??'?'):'Between '+(b2?.year??'?')+' — '+(a2?.year??'?');ap(playerRow,h('span',{class:'challenge-placed',text:'✓ '+lbl}));}
      } else if(noTokens){
        ap(playerRow,h('span',{class:'challenge-no-tokens',text:'No tokens — skipped'}));
      } else {
        const slotBtns=div('challenge-slot-btns');
        for(let si=0;si<=tl.length;si++){
          if(takenSlots.has(si))continue;
          const b2=tl[si-1],a2=tl[si];
          const lbl=si===0?'Before '+(a2?.year??'?'):si===tl.length?'After '+(b2?.year??'?'):'Between '+(b2?.year??'?')+' — '+(a2?.year??'?');
          const s=si;
          ap(slotBtns,btn('slot-btn-sm',lbl,()=>{state.tokens[idx]--;state.challenges.push({playerIdx:idx,slot:s});render();}));
        }
        ap(playerRow,slotBtns);
        ap(playerRow,btn('skip-btn','Pass',()=>{state.challenges.push({playerIdx:idx,slot:-1});render();}));
      }
      ap(challengeCard,playerRow);
    });
    ap(root,challengeCard);
    const respondedCount=state.challenges.length+order.filter(idx=>state.tokens[idx]<=0&&!state.challenges.find(c=>c.playerIdx===idx)).length;
    const allResponded=respondedCount===players.length-1;
    if(allResponded)ap(root,btn('reveal-btn','👁 REVEAL SONG & YEAR',()=>{doReveal();}));
    else ap(root,h('p',{class:'waiting-text',text:'Waiting for all players to challenge or pass…'}));
  }

  if(phase==='namebonus'&&card&&result){
    ap(root,renderResultCard(card,result,players));
    const popup=div('bonus-popup');
    ap(popup,h('p',{class:'bonus-emoji',text:'🎤'}),h('p',{class:'bonus-title',text:'Did '+players[turn]+' name the artist & song?'}),h('p',{class:'bonus-sub',text:'Correctly naming both earns a bonus ⚡ token'}),
      ap(div('bonus-btns'),
        btn('bonus-yes','✓ Yes — +1 ⚡',()=>{state.tokens[turn]=Math.min(state.tokens[turn]+1,MAX_TOKENS);state.phase='result';render();}),
        btn('bonus-no','✗ No',()=>{state.phase='result';render();})
      )
    );
    ap(root,popup);
  }

  if(phase==='result'&&card&&result){
    ap(root,renderResultCard(card,result,players));
    if(result.winner!==null){
      const wTl=timelines[result.winner];
      const tlDiv=div('card',h('p',{class:'label',text:players[result.winner]+"'s Timeline"}));
      const slts=div('tl-slots');
      wTl.forEach(t=>{const isNew=t.title===card.title;const tc=div('tl-card'+(isNew?' tl-correct':''));ap(tc,h('span',{class:'tl-year',text:''+t.year}),ap(div(''),h('p',{class:'tl-title',text:t.title}),h('p',{class:'tl-artist',text:t.artist})));ap(slts,tc);});
      ap(tlDiv,slts);ap(root,tlDiv);
    }
    if(result.gameWon){
      ap(root,btn('next-ok',players[result.winner]+' wins! 🏆 See results',()=>{state.screen='results';render();}));
    } else {
      ap(root,btn(result.winner!==null?'next-ok':'next-next',state.deck.length===0?'SEE RESULTS':'NEXT PLAYER →',()=>{
        if(!state.deck.length){state.screen='results';render();return;}
        state.card=null;state.slot=null;state.locked=false;state.result=null;state.challenges=[];state.phase='draw';
        state.turn=(state.turn+1)%state.playerCount;render();
      }));
    }
  }
  ap(root,btn('end-btn','End Game',()=>{state.screen='results';render();}));
  return root;
}

function renderResultCard(card,result,players){
  const rc=div('result-card '+(result.winner!==null?'correct':'wrong'));
  ap(rc,h('p',{class:'result-title',text:card.title}),h('p',{class:'result-artist',text:card.artist}),h('span',{class:'result-year',text:''+card.year}));
  if(card.yearWarning) ap(rc,h('p',{class:'year-warning',text:'⚠ Year may be inaccurate (remaster/compilation)'}));
  if(result.winner!==null)ap(rc,h('p',{class:'result-verdict correct',text:'✓ '+players[result.winner]+(result.winner===state.turn?' got it right!':' wins the challenge!')}));
  else ap(rc,h('p',{class:'result-verdict wrong',text:'✗ Nobody got it right — card discarded'}));
  return rc;
}

function renderPlaceSlots(tl,selected){
  const wrap=div('card',h('p',{class:'label',text:'YOUR TIMELINE — tap to place'}));
  const slts=div('tl-slots');
  if(tl.length===0){ap(slts,btn('slot-btn'+(selected===0?' slot-selected':''),'+ Place as first card',()=>{state.slot=0;render();}));}
  for(let si=0;si<=tl.length;si++){
    const before=tl[si-1],after=tl[si];
    if(tl.length>0){const lbl=si===0?'Before '+after.year:si===tl.length?'After '+before.year:'Between '+before.year+' — '+after.year;const isSelected=selected===si;const s=si;ap(slts,btn('slot-btn'+(isSelected?' slot-selected':''),lbl,()=>{state.slot=s;render();}));}
    if(after){const tc=div('tl-card');ap(tc,h('span',{class:'tl-year',text:''+after.year}),ap(div(''),h('p',{class:'tl-title',text:after.title}),h('p',{class:'tl-artist',text:after.artist})));ap(slts,tc);}
  }
  ap(wrap,slts);return wrap;
}

function renderSlotsStatic(tl,activeSlot,challenges){
  const slts=div('tl-slots');
  for(let si=0;si<=tl.length;si++){
    const after=tl[si];
    if(si===activeSlot)ap(slts,h('div',{class:'placed-marker',text:'▼ placed here'}));
    (challenges||[]).filter(c=>c.slot===si&&c.slot!==-1).forEach(c=>ap(slts,h('div',{class:'challenge-marker',text:'⚡ '+state.playerNames[c.playerIdx]+' challenges here'})));
    if(after){const tc=div('tl-card');ap(tc,h('span',{class:'tl-year',text:''+after.year}),ap(div(''),h('p',{class:'tl-title',text:after.title}),h('p',{class:'tl-artist',text:after.artist})));ap(slts,tc);}
  }
  return slts;
}

function renderResults(){
  const players=state.playerNames.slice(0,state.playerCount);
  const ranked=players.map((n,i)=>({n,s:state.scores[i],tok:state.tokens[i]})).sort((a,b)=>b.s-a.s);
  const root=div('');
  ap(root,div('hero',ap(div('ring'),'🏆'),h('h1',{text:'RESULTS'})));
  const card=div('card');
  ranked.forEach((p,i)=>{const row=div('results-row');ap(row,h('span',{class:'results-medal',text:['🥇','🥈','🥉'][i]||(i+1+'.')}),h('span',{class:'results-name',text:p.n}),h('span',{class:'results-pts',text:p.s+' pts'}),h('span',{class:'results-tokens',text:'⚡'+p.tok}));ap(card,row);});
  ap(root,card,btn('start-btn','PLAY AGAIN',()=>{state.screen='home';render();}));
  return root;
}

document.addEventListener('DOMContentLoaded',function(){
  try{
    render();
    // Load playlists from server in background
    loadServerPlaylists();
  }catch(err){
    const app=document.getElementById('app');
    app.textContent='ERROR: '+err.message+'\n'+err.stack;
    app.style.cssText='color:#ff6b35;padding:20px;font-family:monospace;white-space:pre;font-size:11px';
  }
});
</script>
